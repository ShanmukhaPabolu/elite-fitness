<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Goal-Based Plan Selector - TLA</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800;900&family=Roboto+Condensed:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- Added jsPDF and html2canvas for PDF generation -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <link rel="shortcut icon" type="image/jpeg" href="logo.jpg" />
    <style>
        /* All existing CSS styles remain unchanged, except for history modal styles which are removed */
        :root {
            --bg-dark: #000000;
            --bg-darker: #050505;
            --bg-lighter: #1A1A1A;
            --text-primary: #FFFFFF;
            --text-secondary: #B0B0B0;
            --text-muted: #666666;
            --border-subtle: rgba(0, 255, 255, 0.15);
            --accent-color: #00FFFF;
            --primary-gradient: linear-gradient(135deg, var(--accent-color) 0%, #0099CC 100%);
            --secondary-gradient: linear-gradient(135deg, var(--accent-orange) 0%, #F7931E 100%);
            --accent-gradient: linear-gradient(135deg, var(--accent-pink) 0%, #C77DFF 100%);
            --accent-orange: #FF6B35;
            --accent-pink: #F72585;
            --recovery-color: #28a745;
            --fatigue-color: #ffc107;
            --danger-color: #ff4d4d;
            --bear-color: #8B4513;
            --lion-color: #DAA520;
            --cheetah-color: #FFA500;
            --eagle-color: #4682B4;
            --wolf-color: #696969;
            --tiger-color: #FF8C00;
            --gorilla-color: #4B0082;
            --shark-color: #00CED1;
            --rest-color: #555555;
            --error-color: #ff4d4d;
            --health-restriction-color: #ff0000;
            --health-restriction-bg: rgba(255, 0, 0, 0.15);
            --health-restriction-border: #ff0000;
        }
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        html {
            scroll-behavior: smooth;
        }
        body {
            font-family: 'Montserrat', sans-serif;
            background-color: var(--bg-dark);
            color: var(--text-primary);
            line-height: 1.6;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
            overflow-x: hidden;
            min-height: 100vh;
            cursor: none !important;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 15px;
        }
        /* Loading Screen - From First Code */
        .loading-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100vh;
            background: var(--bg-dark);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 10001;
            transition: opacity 0.5s ease-out;
        }
        .loading-container {
            text-align: center;
            position: relative;
            width: 100%;
            max-width: 500px;
        }
        .loading-animation {
            position: relative;
            width: 200px;
            height: 200px;
            margin: 0 auto 2rem;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .loading-icon {
            font-size: 3rem;
            color: var(--accent-color);
            animation: pulse-grow 1.5s ease-in-out infinite;
            position: relative;
            z-index: 1;
        }
        .loading-circle {
            position: absolute;
            width: 100%;
            height: 100%;
            border-radius: 50%;
            border: 3px solid transparent;
            border-top-color: var(--accent-color);
            transform: rotate(0deg);
            animation: spin 1.5s cubic-bezier(0.68, -0.55, 0.27, 1.55) infinite;
        }
        .loading-circle::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            width: 10px;
            height: 10px;
            background: var(--accent-color);
            border-radius: 50%;
            transform: translate(-50%, -50%);
            box-shadow: 0 0 10px var(--accent-color);
        }
        .loading-circle-alt {
            position: absolute;
            width: 80%;
            height: 80%;
            border-radius: 50%;
            border: 3px solid transparent;
            border-bottom-color: var(--accent-pink);
            transform: rotate(0deg) scale(0.8);
            animation: spin-reverse 1.2s cubic-bezier(0.68, -0.55, 0.27, 1.55) infinite;
        }
        .loading-text h2 {
            font-size: 2.5rem;
            font-weight: 800;
            margin-bottom: 0.5rem;
            background: var(--primary-gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            letter-spacing: 2px;
            font-family: 'Montserrat', sans-serif;
        }
        .loading-text p {
            color: var(--text-secondary);
            font-style: italic;
            margin-bottom: 2rem;
            font-size: 1.2rem;
            font-family: 'Montserrat', sans-serif;
        }
        .loading-progress {
            display: flex;
            justify-content: center;
            gap: 0.5rem;
            margin-top: 1rem;
        }
        .loading-bar {
            width: 8px;
            height: 30px;
            background: var(--primary-gradient);
            border-radius: 4px;
            animation: loadingPulse 1.4s ease-in-out infinite;
        }
        .loading-bar:nth-child(2) { animation-delay: 0.2s; background: var(--secondary-gradient); }
        .loading-bar:nth-child(3) { animation-delay: 0.4s; background: var(--accent-gradient); }
        .loading-bar:nth-child(4) { animation-delay: 0.6s; background: var(--primary-gradient); }
        .loading-bar:nth-child(5) { animation-delay: 0.8s; background: var(--secondary-gradient); }
        /* Enhanced Cursor */
        .custom-cursor {
            position: fixed;
            width: 40px;
            height: 40px;
            z-index: 99999;
            pointer-events: none;
            transform: translate(-50%, -50%);
            transition: transform 0.1s ease;
        }
        .dumbbell-cursor {
            font-size: 40px;
            color: var(--accent-color);
            animation: rotate 3s linear infinite;
            filter: drop-shadow(0 0 15px rgba(0, 255, 255, 0.9));
        }
        /* Dynamic Background */
        #particle-background {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -10;
        }
        #ambient-glow {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100vh;
            pointer-events: none;
            z-index: 9999;
            background: radial-gradient(circle at var(--x) var(--y), rgba(0, 255, 255, 0.15) 0%, transparent 40%);
            transition: background 0.1s ease-out;
        }
        /* Smash Effects - From First Code */
        .smash-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 10000;
        }
        .smash-particle {
            position: absolute;
            font-size: 16px;
            pointer-events: none;
            animation: smash 0.8s ease-out forwards;
            filter: drop-shadow(0 0 6px rgba(0, 255, 255, 0.7));
        }
        .glass-break {
            position: absolute;
            pointer-events: none;
            animation: glassBreak 0.8s ease-out forwards;
        }
        .glass-shard {
            position: absolute;
            background: linear-gradient(45deg, rgba(255, 255, 255, 0.8), rgba(0, 255, 255, 0.5));
            pointer-events: none;
            animation: shardFly 1s ease-out forwards;
            box-shadow: 0 0 8px rgba(0, 255, 255, 0.7);
        }
        /* Header */
        header {
            position: fixed;
            top: 0;
            width: 100%;
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(20px);
            z-index: 1000;
            padding: 0 24px;
            opacity: 0;
            transform: translateY(-100%);
            animation: slideDown 0.8s ease 3.5s forwards;
            border-bottom: 1px solid var(--border-subtle);
            transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1);
        }
        header.scrolled {
            background: rgba(0, 0, 0, 0.95);
            backdrop-filter: blur(30px);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
        }
        .header-content {
            max-width: 1600px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
            height: 80px;
        }
        .logo {
            font-family: 'Montserrat', sans-serif;
            font-size: 1.8rem;
            font-weight: 800;
            color: var(--text-primary);
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 0.75rem;
            letter-spacing: 1px;
            transition: transform 0.3s ease;
        }
        .logo:hover { transform: scale(1.05); }
        .logo-icon {
            width: 2.5rem;
            height: 2.5rem;
            color: var(--accent-color);
            animation: pulse 2s infinite;
        }
        .header-nav {
            display: flex;
            align-items: center;
            gap: 1rem;
        }
        /* Profile Dropdown - From First Code */
        .profile-dropdown { position: relative; }
        .profile-btn {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            padding: 0.75rem 1.5rem;
            background: var(--primary-gradient);
            border: none;
            border-radius: 50px;
            color: var(--bg-dark);
            font-size: 0.95rem;
            font-weight: 600;
            cursor: none;
            transition: all 0.3s ease;
            font-family: 'Montserrat', sans-serif;
        }
        .profile-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 20px rgba(0, 255, 255, 0.4);
        }
        .profile-avatar {
            width: 24px;
            height: 24px;
            border-radius: 50%;
            background: var(--bg-dark);
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--accent-color);
        }
        .dropdown-menu {
            position: absolute;
            top: 100%;
            right: 0;
            margin-top: 0.5rem;
            background: rgba(26, 26, 26, 0.9);
            backdrop-filter: blur(20px);
            border: 1px solid var(--border-subtle);
            border-radius: 12px;
            overflow: hidden;
            min-width: 200px;
            opacity: 0;
            transform: translateY(-10px);
            transition: all 0.3s ease;
            pointer-events: none;
            z-index: 1000;
        }
        .dropdown-menu.active {
            opacity: 1;
            transform: translateY(0);
            pointer-events: auto;
        }
        .dropdown-item {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            padding: 0.75rem 1rem;
            color: var(--text-secondary);
            text-decoration: none;
            transition: all 0.2s ease;
            font-family: 'Montserrat', sans-serif;
        }
        .dropdown-item:hover {
            background: rgba(255, 255, 255, 0.05);
            color: var(--text-primary);
        }
        .dropdown-item i { width: 16px; text-align: center; }
        .dropdown-divider {
            height: 1px;
            background: var(--border-subtle);
            margin: 0.5rem 0;
        }
        
        .btn, .btn-secondary, .btn-primary {
            font-family: 'Roboto Condensed', sans-serif;
            font-weight: 700;
            padding: 12px 28px;
            border-radius: 50px;
            text-decoration: none;
            transition: all 0.3s ease;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            text-transform: uppercase;
            letter-spacing: 1px;
            border: none;
            position: relative;
            overflow: hidden;
            cursor: none;
        }
        .btn:hover, .btn-secondary:hover, .btn-primary:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 25px rgba(0, 255, 255, 0.5);
        }
        .btn:active, .btn-secondary:active, .btn-primary:active {
            transform: translateY(0px) scale(0.98);
            box-shadow: 0 4px 15px rgba(0, 255, 255, 0.6);
        }
        
        .btn-primary {
            background: var(--primary-gradient);
            color: var(--bg-dark);
        }
        .btn-primary:disabled {
             background: var(--text-muted);
            cursor: not-allowed;
            box-shadow: none;
            transform: none;
        }
        .btn-secondary {
            background: transparent;
            color: var(--accent-color);
            border: 2px solid var(--accent-color);
        }
        .btn-secondary:hover {
            background: var(--accent-color);
            color: var(--bg-dark);
        }
        /* Plan Selector Wizard */
        .plan-selector-wizard {
            padding: 150px 0 60px;
            min-height: 100vh;
        }
        .wizard-header {
            text-align: center;
            margin-bottom: 4rem;
        }
        .wizard-header h1 {
            font-size: clamp(2.5rem, 6vw, 4rem);
            font-weight: 900;
            margin-bottom: 1rem;
            background: linear-gradient(90deg, var(--text-primary), var(--accent-color), var(--text-primary));
            background-size: 200% auto;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            letter-spacing: 2px;
            font-family: 'Montserrat', sans-serif;
        }
        .wizard-header p {
            font-size: 1.125rem;
            color: var(--text-secondary);
            max-width: 800px;
            margin: 0 auto;
            animation: fadeInUp 0.8s ease 0.2s forwards;
            opacity: 0;
        }
        .wizard-container {
            background: rgba(15, 15, 15, 0.7);
            backdrop-filter: blur(15px);
            border: 1px solid var(--border-subtle);
            border-radius: 20px;
            padding: 40px;
            max-width: 900px;
            margin: 0 auto;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.5);
            animation: fadeInUp 0.8s ease 0.4s forwards;
            opacity: 0;
        }
        
        .progress-bar {
            display: flex;
            justify-content: space-between;
            margin-bottom: 2.5rem;
            position: relative;
        }
        .progress-bar::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 0;
            transform: translateY(-50%);
            height: 2px;
            width: 100%;
            background: var(--border-subtle);
            z-index: -1;
        }
        .progress-line {
            position: absolute;
            top: 50%;
            left: 0;
            transform: translateY(-50%);
            height: 2px;
            background: var(--accent-color);
            transition: width 0.5s ease;
        }
        .step {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 0.5rem;
            color: var(--text-muted);
            transition: color 0.5s ease;
        }
        .step.active {
            color: var(--accent-color);
        }
        .step-icon {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            border: 2px solid var(--border-subtle);
            display: flex;
            align-items: center;
            justify-content: center;
            background: var(--bg-dark);
            transition: all 0.5s ease;
        }
        .step.active .step-icon {
            background: var(--accent-color);
            color: var(--bg-dark);
            border-color: var(--accent-color);
            transform: scale(1.1);
        }
        .step.completed .step-icon {
            background: var(--accent-color);
            color: var(--bg-dark);
            border-color: var(--accent-color);
        }
        .wizard-step { animation: fadeIn 0.5s ease; }
        .wizard-step h2 {
            font-size: 1.8rem;
            font-weight: 700;
            margin-bottom: 2rem;
            color: var(--accent-color);
            text-align: center;
        }
        
        .selection-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 1.5rem;
        }
        .selection-card {
            background: var(--bg-lighter);
            border: 1px solid var(--border-subtle);
            border-radius: 12px;
            padding: 1.5rem;
            text-align: center;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }
        .selection-card:hover {
            transform: translateY(-5px);
            border-color: var(--accent-color);
            box-shadow: 0 10px 30px rgba(0, 255, 255, 0.2);
        }
        .selection-card.selected {
            border-color: var(--accent-color);
            box-shadow: 0 0 30px rgba(0, 255, 255, 0.5), inset 0 0 25px rgba(0, 255, 255, 0.4);
            background: linear-gradient(rgba(0,255,255,0.15), transparent);
            transform: translateY(-5px) scale(1.02);
        }
        .selection-card i {
            font-size: 3rem;
            color: var(--accent-color);
            margin-bottom: 1rem;
            transition: transform 0.3s ease;
        }
        .selection-card:hover i { transform: scale(1.1); }
        .selection-card h3 {
            font-size: 1.2rem;
            color: var(--text-primary);
        }
        .biometrics-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 2rem;
        }
        .input-group {
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }
        .input-group label {
            font-weight: 600;
            color: var(--text-secondary);
        }
        .input-group input, .input-group select {
            width: 100%;
            padding: 12px 20px;
            font-size: 1rem;
            background-color: var(--bg-dark);
            color: var(--text-primary);
            border: 1px solid var(--border-subtle);
            border-radius: 8px;
            transition: all 0.3s ease;
        }
        .input-group input:focus {
            outline: none;
            border-color: var(--accent-color);
            box-shadow: 0 0 20px rgba(0, 255, 255, 0.7);
            transform: scale(1.02);
        }
        .height-inputs { display: flex; gap: 10px; }
        .error-message { color: var(--error-color); font-size: 0.9rem; margin-top: 5px; }
        .input-group.error input {
            border-color: var(--error-color);
            animation: error-glow 0.5s ease-in-out;
        }
        .wizard-nav {
            display: flex;
            justify-content: space-between;
            margin-top: 3rem;
        }
        
        /* Body Type Selection */
        .body-type-options {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 20px;
            margin-top: 10px;
        }
        
        .body-type-option {
            display: flex;
            flex-direction: column;
            align-items: center;
            background-color: var(--bg-dark);
            border: 2px solid var(--border-subtle);
            border-radius: 12px;
            padding: 15px;
            transition: all 0.3s ease;
            cursor: pointer;
            position: relative;
            overflow: hidden;
            transform: perspective(500px) rotateX(0);
            transform-style: preserve-3d;
        }
        
        .body-type-option::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: var(--accent-gradient);
            opacity: 0;
            transition: opacity 0.3s ease;
            z-index: 0;
        }
        
        .body-type-option:hover {
            border-color: var(--accent-pink);
            box-shadow: 0 8px 25px rgba(247, 37, 133, 0.4);
            transform: translateY(-5px) perspective(500px) rotateX(5deg);
        }
        
        .body-type-option:hover::before {
            opacity: 0.1;
        }
        
        .body-type-option input[type="radio"] {
            display: none;
        }
        
        .body-type-option.selected {
            border-color: var(--accent-pink);
            background-color: rgba(247, 37, 133, 0.1);
            box-shadow: 0 8px 25px rgba(247, 37, 133, 0.4);
        }
        
        .body-type-option.selected::before {
            opacity: 0.2;
        }
        
        .body-type-option .body-model {
            width: 150px;
            height: 200px;
            margin-bottom: 5px;
            position: relative;
            z-index: 1;
            object-fit: cover;
            border-radius: 8px;
            transition: all 0.3s ease;
        }
        
        .body-type-option:hover .body-model {
            transform: scale(1.05);
            box-shadow: 0 0 15px rgba(247, 37, 133, 0.5);
        }
        
        .body-type-option span {
            font-size: 0.9rem;
            color: var(--text-primary);
            text-align: center;
            position: relative;
            z-index: 1;
            transition: all 0.3s ease;
            font-weight: 500;
        }
        
        .body-type-option.selected span {
            color: var(--accent-pink);
            font-weight: 700;
            text-shadow: 0 0 10px rgba(247, 37, 133, 0.5);
        }
        
        /* Fitness Level Description */
        .fitness-description {
            font-size: 0.9rem;
            color: var(--text-secondary);
            margin-top: 10px;
            padding: 15px;
            background-color: rgba(0, 0, 0, 0.3);
            border-radius: 12px;
            border-left: 3px solid var(--accent-color);
            transition: all 0.3s ease;
        }
        
        .fitness-description:hover {
            background-color: rgba(0, 255, 255, 0.05);
            box-shadow: 0 0 15px rgba(0, 255, 255, 0.1);
            transform: translateY(-2px);
        }
        
        .fitness-level-item {
            margin-bottom: 10px;
            padding-left: 20px;
            position: relative;
        }
        
        .fitness-level-item:before {
            content: '•';
            position: absolute;
            left: 0;
            color: var(--accent-color);
        }
        
        /* Equipment Selection Styles - From First Code */
        .equipment-options {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
            gap: 15px;
            margin-bottom: 15px;
        }
        
        .equipment-option {
            display: flex;
            align-items: center;
            justify-content: center;
            background-color: var(--bg-dark);
            border: 2px solid var(--border-subtle);
            border-radius: 12px;
            padding: 15px;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
            cursor: pointer;
            height: 60px;
            transform: perspective(500px) rotateX(0);
            transform-style: preserve-3d;
        }
        
        .equipment-option::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 0;
            height: 100%;
            background: var(--primary-gradient);
            opacity: 0.2;
            transition: width 0.5s ease;
            z-index: 0;
            transform-origin: left;
        }
        
        .equipment-option:hover {
            border-color: var(--accent-color);
            box-shadow: 0 8px 25px rgba(0, 255, 255, 0.3);

    <script type="text/babel">
        const { useState, useEffect, useRef, useCallback } = React;
        
        // Unchanged Components from Original Code
        const LoadingScreen = () => {

        const CustomCursor = () => {
            const [position, setPosition] = useState({ x: -100, y: -100 });
            useEffect(() => {
                const handleMouseMove = (e) => setPosition({ x: e.clientX, y: e.clientY });
                window.addEventListener('mousemove', handleMouseMove);
                return () => window.removeEventListener('mousemove', handleMouseMove);
            }, []);

                <div className="custom-cursor" style={{ left: `${position.x}px`, top: `${position.y}px` }}>
                    <i className="fas fa-dumbbell dumbbell-cursor"></i>
                </div>
            );
        };
        const AmbientGlow = () => {
            useEffect(() => {
                const glowElement = document.getElementById('ambient-glow');
                const handleMouseMove = (e) => {
                    glowElement.style.setProperty('--x', `${e.clientX}px`);
                    glowElement.style.setProperty('--y', `${e.clientY}px`);
                };
                window.addEventListener('mousemove', handleMouseMove);
                return () => window.removeEventListener('mousemove', handleMouseMove);
            }, []);
            return null;
        };
        const SmashEffectContainer = ({ smashEvents }) => {
            const [particles, setParticles] = useState([]);
            const [glassBreaks, setGlassBreaks] = useState([]);
            const [glassShards, setGlassShards] = useState([]);
            const breakSound = useRef(null);
            useEffect(() => {
                breakSound.current = document.getElementById('smash-sound');
            }, []);
            const sportIcons = ['fas fa-dumbbell', 'fas fa-running', 'fas fa-bicycle', 'fas fa-swimmer', 'fas fa-fist-raised', 'fas fa-basketball-ball', 'fas fa-football-ball', 'fas fa-table-tennis', 'fas fa-volleyball-ball', 'fas fa-baseball-ball'];
            useEffect(() => {
                if (smashEvents.length === 0) return;
                const { x, y } = smashEvents[smashEvents.length - 1];
                if (breakSound.current) {
                    breakSound.current.volume = 0.5;
                    breakSound.current.currentTime = 0;
                    breakSound.current.play().catch(err => console.error("Audio play failed:", err));
                }
                
                // Create glass break effect
                const newGlassBreak = document.createElement('div');
                newGlassBreak.className = 'glass-break';
                newGlassBreak.style.left = `${x - 75}px`;
                newGlassBreak.style.top = `${y - 75}px`;
                newGlassBreak.style.width = '150px';
                newGlassBreak.style.height = '150px';
                newGlassBreak.style.borderRadius = '50%';
                newGlassBreak.style.background = `radial-gradient(circle, rgba(255,255,255,0.9) 0%, rgba(0, 255, 255, 0.88) 50%, transparent 70%)`;
                setGlassBreaks(prev => [...prev, newGlassBreak]);
                
                // Create glass shards
                const newShards = [];
                for (let i = 0; i < 25; i++) {
                    const shard = document.createElement('div');
                    shard.className = 'glass-shard';
                    shard.style.left = `${x}px`;
                    shard.style.top = `${y}px`;
                    shard.style.width = `${Math.random() * 15 + 5}px`;
                    shard.style.height = `${Math.random() * 20 + 8}px`;
                    shard.style.setProperty('--tx', `${(Math.random() - 0.5) * 150}px`);
                    shard.style.setProperty('--ty', `${(Math.random() - 0.5) * 150}px`);
                    shard.style.setProperty('--rotation', `${(Math.random() - 0.5) * 360}deg`);
                    shard.style.animationDuration = `${Math.random() * 0.8 + 0.8}s`;
                    shard.style.background = `linear-gradient(45deg, rgba(255, 255, 255, 0.8), rgba(0, 255, 255, 0.88))`;
                    newShards.push(shard);
                }
                setGlassShards(prev => [...prev, ...newShards]);
                
                // Create icon particles
                const newParticles = Array.from({ length: 25 }).map((_, i) => ({ 
                    id: `p-${Date.now()}-${i}`, 
                    x, 
                    y, 
                    icon: sportIcons[Math.floor(Math.random() * sportIcons.length)], 
                    tx: (Math.random() - 0.5) * 150, 
                    ty: (Math.random() - 0.5) * 150, 
                    duration: Math.random() * 0.8 + 0.8 
                }));
                setParticles(prev => [...prev, ...newParticles]);
                
                // Clean up effects after animations
                setTimeout(() => {
                    setGlassBreaks([]);
                    setGlassShards([]);
                    setParticles([]);
                }, 1500);
            }, [smashEvents]);
            
            return (
                <div className="smash-container">
                    {glassBreaks.map((breakEl, i) => (
                        <div key={i} className="glass-break" style={{
                            left: breakEl.style.left,
                            top: breakEl.style.top,
                            width: breakEl.style.width,
                            height: breakEl.style.height,
                            borderRadius: breakEl.style.borderRadius,
                            background: breakEl.style.background
                        }}></div>
                    ))}
                    {glassShards.map((shard, i) => (
                        <div key={i} className="glass-shard" style={{
                            left: shard.style.left,
                            top: shard.style.top,
                            width: shard.style.width,
                            height: shard.style.height,
                            '--tx': shard.style.getPropertyValue('--tx'),
                            '--ty': shard.style.getPropertyValue('--ty'),
                            '--rotation': shard.style.getPropertyValue('--rotation'),
                            animationDuration: shard.style.animationDuration,
                            background: shard.style.background
                        }}></div>
                    ))}
                    {particles.map(p => (
                        <div key={p.id} className="smash-particle" style={{ 
                            left: p.x, 
                            top: p.y, 
                            '--tx': `${p.tx}px`, 
                            '--ty': `${p.ty}px`, 
                            animationDuration: `${p.duration}s` 
                        }}>
                            <i className={p.icon}></i>
                        </div>
                    ))}
                </div>
            );
        };
        
        // RENDER GENERATED PLAN COMPONENT
        const GeneratedPlan = ({ plan, planRef }) => {
            useScrollAnimation();
            
            console.log('GeneratedPlan component rendering with:', plan);
            
            // Validate plan data
            if (!plan) {

            // Days of the week

            console.log('Parsed plan structure:', {

            return (

                         {dietPlan.length > 0 && (

                                     <div key={idx} style={{marginBottom: '10px', padding: '8px', backgroundColor: 'rgba(0,255,255,0.05)', borderRadius: '4px'}}>
                                         <h4><i className="fas fa-calendar-day"></i> {meal.d}</h4>

                         {/* Fallback: original day-by-day view */}

        // UPDATED Header Component
const Header = () => {
    const [scrolled, setScrolled] = useState(false);
    const [isProfileDropdownOpen, setIsProfileDropdownOpen] = useState(false);
    const [userName, setUserName] = useState("Athlete");
    
    useEffect(() => {
        // Check if user is logged in by checking session via API
        const checkAuthStatus = async () => {
            try {
                const response = await fetch('/api/check-auth', {
                    method: 'GET',
                    credentials: 'include' // Important for session cookies
                });
                
                if (response.ok) {
                    const data = await response.json();
                    if (data.logged_in && data.user_email) {
                        // Extract name from email or use a default
                        const emailParts = data.user_email.split('@');
                        // Use the stored user_name from the session if available, otherwise fallback to the email part
                        const nameFromApi = data.user_name;
                        setUserName(nameFromApi);

                        // Also store in localStorage for persistence
                        localStorage.setItem('userName', nameFromApi);
                    }
                } else {
                    // If not logged in, clear any stored name
                    localStorage.removeItem('userName');
                    setUserName("Athlete");
                }
            } catch (error) {
                console.error('Error checking auth status:', error);
                // Fallback to localStorage if API fails
                const storedName = localStorage.getItem('userName');
                if (storedName) {
                    setUserName(storedName);
                }
            }
        };
        
        checkAuthStatus();
        
        const handleScroll = () => setScrolled(window.scrollY > 10);
        window.addEventListener('scroll', handleScroll);
        
        return () => {
            window.removeEventListener('scroll', handleScroll);
        };
    }, []);
    
    const handleLogout = async (e) => {
        e.preventDefault();
        setIsProfileDropdownOpen(false);
        
        try {
            // Call logout endpoint to clear session
            await fetch('/api/logout', {
                method: 'POST',
                credentials: 'include'
            });
        } catch (error) {
            console.error('Error during logout:', error);
        }
        
        // Clear local storage
        localStorage.removeItem('userName');
        setUserName("Athlete");
        
        // Redirect to login page
        window.location.href = 'login.html';
    };
    
    return (
        <header className={scrolled ? 'scrolled' : ''}>
            <div className="header-content">
                <a href="plan.html" className="logo">
                    <i className="fas fa-dumbbell logo-icon"></i>
                    <span>ELITE</span>

                    const imgData = canvas.toDataURL('image/png');
                    const pdf = new jsPDF('p', 'mm', 'a4');
                    const pdfWidth = pdf.internal.pageSize.getWidth();
                    const pdfHeight = pdf.internal.pageSize.getHeight();
                    const canvasWidth = canvas.width;
                    const canvasHeight = canvas.height;
                    const ratio = canvasWidth / canvasHeight;
                    const imgWidth = pdfWidth;
                    const imgHeight = imgWidth / ratio;

                    let heightLeft = imgHeight;
                    let position = 0;

                    pdf.addImage(imgData, 'PNG', 0, position, imgWidth, imgHeight);
                    heightLeft -= pdfHeight;

                    while (heightLeft > 0) {
                        position = heightLeft - imgHeight;
                        pdf.addPage();
                        pdf.addImage(imgData, 'PNG', 0, position, imgWidth, imgHeight);
                        heightLeft -= pdfHeight;
                    }
                    
                    pdf.save('Your-Elite-Plan.pdf');
                });
            };

            const handleSharePlan = async () => {
                if (!generatedPlan) return;
            
                // Create a text version of the plan
                let planText = `My Elite Fitness Plan\nGoal: ${formData.goal.replace('-', ' ')}\n\n`;
            
                // Workout Plan

                generatedPlan.workout_plan?.forEach(day => {

                    day.ex?.forEach(ex => {

                // Diet Plan
                planText += "\n\n--- DIET PLAN ---\n";
                const daysOfWeek = ['Monday', 'Tuesday', 'Wednesday', 'Thursday', 'Friday', 'Saturday', 'Sunday'];
                daysOfWeek.forEach(day => {

            );
        };
        
        // Main App Component
        const App = () => {
            const [smashEvents, setSmashEvents] = useState([]);
            
            useEffect(() => {
                const canvas = document.getElementById('particle-background');
                const ctx = canvas.getContext('2d');
                canvas.width = window.innerWidth;
                canvas.height = window.innerHeight;
                let particlesArray = [];
                
                // Particle class
                class Particle {
                    constructor(x, y, size, color, weight) {
                        this.x = x;
                        this.y = y;
                        this.size = size;
                        this.color = color;
                        this.weight = weight;
                        this.baseX = this.x;
                        this.baseY = this.y;
                        this.density = Math.random() * 30 + 1;
                    }
                    
                    draw() {
                        ctx.fillStyle = this.color;
                        ctx.beginPath();
                        ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                        ctx.closePath();
                        ctx.fill();
                    }
                    
                    update(mouse) {
                        let dx = mouse.x - this.x;
                        let dy = mouse.y - this.y;
                        let dist = Math.sqrt(dx * dx + dy * dy);
                        let forceDirX = dx / dist;
                        let forceDirY = dy / dist;
                        let maxDist = mouse.radius;
                        let force = (maxDist - dist) / maxDist;
                        let dirX = forceDirX * force * this.density;
                        let dirY = forceDirY * force * this.density;
                        
                        if (dist < mouse.radius) {
                            this.x -= dirX;
                            this.y -= dirY;
                        } else {
                            if (this.x !== this.baseX) {
                                let dx = this.x - this.baseX;
                                this.x -= dx / 10;
                            }
                            if (this.y !== this.baseY) {
                                let dy = this.y - this.baseY;
                                this.y -= dy / 10;
                            }
                        }
                    }
                }
                
                // Initialize particles
                function init() {
                    particlesArray = [];
                    for (let i = 0; i < 100; i++) {
                        let size = Math.random() * 5 + 1;
                        let x = Math.random() * (innerWidth - size * 2 - size * 2) + size * 2;
                        let y = Math.random() * (innerHeight - size * 2 - size * 2) + size * 2;
                        let color = 'rgba(0, 255, 255, 0.2)';
                        particlesArray.push(new Particle(x, y, size, color));
                    }
                }
                
                // Animation loop
                let animationFrameId;
                const mouse = {
                    x: null,
                    y: null,
                    radius: 150
                };
                
                window.addEventListener('mousemove', (e) => {
                    mouse.x = e.x;
                    mouse.y = e.y;
                });
                
                window.addEventListener('mouseout', () => {
                    mouse.x = undefined;
                    mouse.y = undefined;
                });
                
                function animate() {
                    ctx.clearRect(0, 0, canvas.width, canvas.height);
                    for (let i = 0; i < particlesArray.length; i++) {
                        particlesArray[i].draw();
                        particlesArray[i].update(mouse);
                    }
                    animationFrameId = requestAnimationFrame(animate);
                }
                
                init();
                animate();
                
                // Handle window resize
                window.addEventListener('resize', () => {
                    canvas.width = innerWidth;
                    canvas.height = innerHeight;
                    init();
                });
                
                return () => {
                    cancelAnimationFrame(animationFrameId);
                };
            }, []);
            
            const handleSmash = useCallback((x, y) => {
                const el = document.elementFromPoint(x, y);
                if (el && ['A', 'BUTTON', 'INPUT', 'SELECT', 'TEXTAREA'].includes(el.tagName)) return;
                setSmashEvents(prev => [...prev, { x, y, id: Date.now() }]);
            }, []);
            
            useEffect(() => {
                const handleClick = (e) => handleSmash(e.clientX, e.clientY);
                document.addEventListener('click', handleClick);
                return () => document.removeEventListener('click', handleClick);
            }, [handleSmash]);
            
            return (
                <>
                    <LoadingScreen />
                    <CustomCursor />
                    <AmbientGlow />
                    <SmashEffectContainer smashEvents={smashEvents} />
                    <Header />
                    <PlanSelector />
                    <footer className="footer">
                        <div className="container">
                            <p>&copy; 2025 TLA. All rights reserved.</p>
                        </div>
                    </footer>
                </>
            );
        };
        
        const container = document.getElementById('root');
        const root = ReactDOM.createRoot(container);
        root.render(<App />);
        
    </script>
